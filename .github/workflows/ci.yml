name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build, test and verify (incl. coverage gate)
        run: mvn -B -ntp verify
      - name: Stage core and annotation in mavenLocal for the Gradle build
        run: mvn -B -ntp -DskipTests install
      - uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4
      - name: Build and test the Gradle plugin (incl. coverage gate)
        run: ./gradlew build
        working-directory: bpmn-backlink-gradle-plugin
