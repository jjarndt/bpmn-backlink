name: Release to Maven Central

# Publishes the Maven modules to Maven Central via the Sonatype Central Portal,
# then the Gradle plugin to the Gradle Plugin Portal and to Maven Central.
#
# Trigger: push a tag like `v0.2.0` on a commit whose POM version is the matching
# release version (no -SNAPSHOT — the Central Portal rejects snapshots), or run
# the workflow manually from such a tag. A guard step fails the run before any
# secret is used when the ref is not a `v*` tag or the tag does not match the
# POM version. Typical release flow:
#
#   mvn versions:set -DnewVersion=0.2.0 -DgenerateBackupPoms=false
#   git commit -am "chore(release): 0.2.0" && git tag v0.2.0
#   git push origin main --tags
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   CENTRAL_USERNAME      - Sonatype Central Portal user token name
#   CENTRAL_PASSWORD      - Sonatype Central Portal user token password
#   GPG_PRIVATE_KEY       - ASCII-armored, passphrase-less GPG private signing key
#   GRADLE_PUBLISH_KEY    - Gradle Plugin Portal API key
#   GRADLE_PUBLISH_SECRET - Gradle Plugin Portal API secret

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Runs before setup-java so no secret reaches the runner on a bad ref.
      - name: Verify ref is a release tag matching the POM version
        run: |
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            echo "::error::Release must run from a v* tag, got $GITHUB_REF"
            exit 1
          fi
          case "$GITHUB_REF_NAME" in
            v*) ;;
            *)
              echo "::error::Release tag must start with v, got $GITHUB_REF_NAME"
              exit 1
              ;;
          esac
          tag_version="${GITHUB_REF_NAME#v}"
          pom_version=$(python3 -c "import xml.etree.ElementTree as ET; print(ET.parse('pom.xml').getroot().find('{http://maven.apache.org/POM/4.0.0}version').text)")
          if [ "$tag_version" != "$pom_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match POM version $pom_version"
            exit 1
          fi

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          # Writes ~/.m2/settings.xml with a <server id="central"> entry whose
          # credentials come from the env vars below, and imports the GPG key.
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Build, sign and publish to Maven Central
        run: >-
          mvn -B -ntp -Prelease
          -Dcentral.autoPublish=true
          -Dcentral.waitUntil=published
          clean deploy
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}

      # The Gradle steps below are additive: the Maven release above is already
      # complete, so a Gradle failure cannot damage it. The Gradle plugin build
      # consumes the release version of bpmn-backlink-core from mavenLocal
      # instead of waiting for the Central sync.
      - name: Stage the release version in mavenLocal for the Gradle build
        run: mvn -B -ntp -DskipTests install

      - uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Publish to the Gradle Plugin Portal
        run: ./gradlew publishPlugins
        working-directory: bpmn-backlink-gradle-plugin
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Publish the Gradle plugin to Maven Central
        run: ./gradlew publishAggregationToCentralPortal
        working-directory: bpmn-backlink-gradle-plugin
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
